<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Тренировка каскада</title>
    <link rel="stylesheet" href="cascade-practice.css">
</head>
<body>
    <h1>Тренировка каскада CSS</h1>

    <!-- ЗАДАЧА 1: type vs class -->
    <h2>Задача 1</h2>
    <p class="highlight" id="task1">Какого я цвета? blue</p>

    <!-- ЗАДАЧА 2: один ID vs много классов -->
    <h2>Задача 2</h2>
    <p class="a b c d" id="task2">А я какого цвета? orange</p>

    <!-- ЗАДАЧА 3: наследование vs прямое указание -->
    <h2>Задача 3</h2>
    <div id="task3-parent">
        <p>Я наследник #task3-parent. Какого я цвета? red</p>
    </div>

    <!-- ЗАДАЧА 4: порядок правил -->
    <h2>Задача 4</h2>
    <p class="task4">Кто здесь главный — первое или последнее правило? </p>
</body>
</html>
